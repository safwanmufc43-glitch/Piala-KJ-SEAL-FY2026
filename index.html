<body>

<div class="court-stripe"></div>

<header>
  <div class="eyebrow">15-team draw · knockout finish</div>
  <h1>Volleyball tournament tracker</h1>
  <p class="sub" id="header-sub">Live results — standings and the knockout bracket update automatically.</p>
  <div id="admin-bar" style="margin-top:0.8rem; font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;">
    <span id="admin-status" style="font-size:0.78rem; color:var(--ink-soft);">Viewing only</span>
    <button id="admin-login-btn" style="margin-left:0.5rem; font-family:inherit; font-size:0.75rem; font-weight:600; padding:0.3rem 0.7rem; border-radius:6px; border:1px solid var(--border); background:var(--card); color:var(--court); cursor:pointer;">Editor login</button>
    <button id="admin-logout-btn" style="display:none; margin-left:0.5rem; font-family:inherit; font-size:0.75rem; font-weight:600; padding:0.3rem 0.7rem; border-radius:6px; border:1px solid var(--border); background:var(--card); color:var(--loss); cursor:pointer;">Log out</button>

  <button class="active" data-view="standings">Standings</button>

</nav>

<main>

  <div class="view active" id="view-standings">
    <div class="group-grid" id="standings-grid"></div>
    <div class="legend"><span class="dot">●</span> qualifies for the knockout stage (top 2 per group)</div>
  </div>

  <div class="view" id="view-fixtures">
    <div id="fixtures-container"></div>
    <div id="reset-toolbar" class="toolbar" style="display:none;">
      <button id="reset-btn">Reset all results</button>
    </div>
  </div>

  <div class="view" id="view-knockout">
    <div id="knockout-container"></div>
  </div>

</main>

<script>
const ADMIN_PASSWORD = "pialasealkj2026"; // change this to your own password
const FIREBASE_PATH = "tournament_state";
let isAdmin = sessionStorage.getItem('volleyball_is_admin') === 'true';
let fbInitialized = false;

const groups = {
  A: [1,2,3,4],
  B: [5,6,7,8],
  C: [9,10,11,12],
  D: [13,14,15]
};

function teamName(id) { return 'Team ' + id; }

function buildFixtures() {
  const fixtures = [];
  function roundRobin(groupKey, teamIds) {
    const n = teamIds.length;
    if (n === 4) {
      const md = [[[0,1],[2,3]], [[0,2],[1,3]], [[0,3],[1,2]]];
      md.forEach((pairs, i) => {
        pairs.forEach(([a,b]) => {
          fixtures.push({ id: `${groupKey}-md${i+1}-${teamIds[a]}-${teamIds[b]}`, group: groupKey, matchday: i+1, teamA: teamIds[a], teamB: teamIds[b], setsA: null, setsB: null });
        });
      });
    } else if (n === 3) {
      const rounds = [
        { pair: [0,1], byeIdx: 2 },
        { pair: [0,2], byeIdx: 1 },
        { pair: [1,2], byeIdx: 0 }
      ];
      rounds.forEach((r, i) => {
        fixtures.push({ id: `${groupKey}-md${i+1}-${teamIds[r.pair[0]]}-${teamIds[r.pair[1]]}`, group: groupKey, matchday: i+1, teamA: teamIds[r.pair[0]], teamB: teamIds[r.pair[1]], setsA: null, setsB: null, byeTeam: teamIds[r.byeIdx] });
      });
    }
  }
  Object.entries(groups).forEach(([key, ids]) => roundRobin(key, ids));
  return fixtures;
}

let fixtures = buildFixtures();

function loadState() {
  // no-op locally; Firebase listener (setupFirebaseSync) drives state now
}

let suppressNextWrite = false;

function saveState() {
  if (!window.__fbDb) return;
  suppressNextWrite = true;
  const payload = { fixtures: fixtures.map(f => ({ id: f.id, setsA: f.setsA, setsB: f.setsB })), koOverrides };
  window.__fbSet(window.__fbRef(window.__fbDb, FIREBASE_PATH), payload).catch(err => {
    console.error('Firebase write failed:', err);
    alert('Could not save — check your internet connection or Firebase config.');
  });
}

function applyRemoteState(saved) {
  if (!saved) return;
  if (Array.isArray(saved.fixtures)) {
    fixtures.forEach(f => {
      const match = saved.fixtures.find(s => s.id === f.id);
      if (match) { f.setsA = match.setsA; f.setsB = match.setsB; }
      else { f.setsA = null; f.setsB = null; }
    });
  }
  koOverrides = saved.koOverrides || {};
  renderStandings();
  renderFixtures();
  renderKnockout();
}

function setupFirebaseSync() {
  if (!window.__fbDb || fbInitialized) return;
  fbInitialized = true;
  const stateRef = window.__fbRef(window.__fbDb, FIREBASE_PATH);
  window.__fbOnValue(stateRef, (snapshot) => {
    if (suppressNextWrite) { suppressNextWrite = false; return; }
    applyRemoteState(snapshot.val());
  });
}

function computeStandings(groupKey) {
  const ids = groups[groupKey];
  const table = {};
  ids.forEach(id => { table[id] = { id, played: 0, wins: 0, losses: 0, setsFor: 0, setsAgainst: 0 }; });

  fixtures.filter(f => f.group === groupKey).forEach(f => {
    if (f.setsA === null || f.setsB === null || f.setsA === '' || f.setsB === '') return;
    const a = table[f.teamA], b = table[f.teamB];
    const sa = Number(f.setsA), sb = Number(f.setsB);
    a.played++; b.played++;
    a.setsFor += sa; a.setsAgainst += sb;
    b.setsFor += sb; b.setsAgainst += sa;
    if (sa > sb) { a.wins++; b.losses++; }
    else if (sb > sa) { b.wins++; a.losses++; }
  });

  const rows = Object.values(table).map(r => ({
    ...r,
    points: r.wins * 2 + r.losses * 1 * 0,
    setRatio: r.setsAgainst === 0 ? (r.setsFor > 0 ? Infinity : 0) : r.setsFor / r.setsAgainst
  }));

  rows.sort((x, y) => {
    if (y.wins !== x.wins) return y.wins - x.wins;
    const xr = x.setRatio === Infinity ? 999 : x.setRatio;
    const yr = y.setRatio === Infinity ? 999 : y.setRatio;
    if (yr !== xr) return yr - xr;
    return (y.setsFor - y.setsAgainst) - (x.setsFor - x.setsAgainst);
  });

  return rows;
}

function renderStandings() {
  const grid = document.getElementById('standings-grid');
  grid.innerHTML = '';
  Object.keys(groups).forEach(key => {
    const rows = computeStandings(key);
    const card = document.createElement('div');
    card.className = 'group-card';
    const totalMatches = fixtures.filter(f => f.group === key).length;
    const playedMatches = fixtures.filter(f => f.group === key && f.setsA !== null && f.setsA !== '').length;
    card.innerHTML = `
      <div class="head"><span>Group ${key}</span><span class="count">${playedMatches}/${totalMatches} played</span></div>
      <table class="standings">
        <thead><tr>
          <th class="team-col">Team</th><th>P</th><th>W</th><th>L</th><th>Sets</th><th>Ratio</th>
        </tr></thead>
        <tbody>
          ${rows.map((r, i) => `
            <tr class="${i < 2 ? 'qualify' : ''}">
              <td class="team-col">${teamName(r.id)}</td>
              <td>${r.played}</td>
              <td>${r.wins}</td>
              <td>${r.losses}</td>
              <td>${r.setsFor}-${r.setsAgainst}</td>
              <td>${r.setRatio === Infinity ? '—' : r.setRatio.toFixed(2)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    `;
    grid.appendChild(card);
  });
}

function renderFixtures() {
  const container = document.getElementById('fixtures-container');
  container.innerHTML = '';
  Object.keys(groups).forEach(key => {
    const section = document.createElement('div');
    section.className = 'group-section';
    const groupFixtures = fixtures.filter(f => f.group === key);
    const matchdays = [...new Set(groupFixtures.map(f => f.matchday))].sort();

    let html = `<h2>Group ${key}</h2>`;
    matchdays.forEach(md => {
      html += `<div class="matchday-block"><h3>Matchday ${md}</h3>`;
      const dayFixtures = groupFixtures.filter(f => f.matchday === md);
      dayFixtures.forEach(f => {
        const played = f.setsA !== null && f.setsA !== '' && f.setsB !== null && f.setsB !== '';
        const aWins = played && Number(f.setsA) > Number(f.setsB);
        const bWins = played && Number(f.setsB) > Number(f.setsA);
        html += `
          <div class="match-row">
            <div class="team-name left ${aWins ? 'winner' : ''}">${teamName(f.teamA)}</div>
            ${isAdmin ? `
            <div class="score-input-group">
              <input type="number" min="0" max="5" inputmode="numeric" data-fixture="${f.id}" data-side="A" value="${f.setsA ?? ''}" placeholder="0">
              <span class="vs">sets</span>
              <input type="number" min="0" max="5" inputmode="numeric" data-fixture="${f.id}" data-side="B" value="${f.setsB ?? ''}" placeholder="0">
            </div>` : `
            <div class="score-input-group" style="font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; font-weight:600; font-size:0.95rem;">
              <span>${f.setsA ?? '–'}</span><span class="vs">sets</span><span>${f.setsB ?? '–'}</span>
            </div>`}
            <div class="team-name right ${bWins ? 'winner' : ''}">${teamName(f.teamB)}</div>
            <span class="status-chip ${played ? 'played' : 'pending'}">${played ? 'Played' : 'Pending'}</span>
          </div>`;
        if (f.byeTeam) {
          html += `<div class="bye-row">${teamName(f.byeTeam)} — bye this round</div>`;
        }
      });
      html += `</div>`;
    });
    section.innerHTML = html;
    container.appendChild(section);
  });

  if (!isAdmin) return;
  container.querySelectorAll('input[type="number"]').forEach(input => {
    input.addEventListener('input', (e) => {
      const fid = e.target.dataset.fixture;
      const side = e.target.dataset.side;
      const f = fixtures.find(x => x.id === fid);
      if (!f) return;
      const val = e.target.value === '' ? '' : Math.max(0, Math.min(5, Number(e.target.value)));
      if (side === 'A') f.setsA = val; else f.setsB = val;
      saveState();
      renderStandings();
      renderFixtures();
      renderKnockout();
    });
  });
}

function getQualifiers(groupKey) {
  return computeStandings(groupKey).slice(0, 2).map(r => r.id);
}

let koOverrides = {};

function getQfTeams() {
  const a = getQualifiers('A'), b = getQualifiers('B'), c = getQualifiers('C'), d = getQualifiers('D');
  return {
    qf1: [a[0] ?? null, d[1] ?? null],
    qf2: [c[0] ?? null, b[1] ?? null],
    qf3: [b[0] ?? null, c[1] ?? null],
    qf4: [d[0] ?? null, a[1] ?? null]
  };
}

function koWinner(matchKey, teamPair) {
  if (!teamPair[0] || !teamPair[1]) return null;
  const key = `${matchKey}-${teamPair[0]}-${teamPair[1]}`;
  if (koOverrides[key]) return koOverrides[key];
  return null;
}

function renderKnockout() {
  const container = document.getElementById('knockout-container');
  const qf = getQfTeams();

  const qf1Winner = koWinner('qf1', qf.qf1);
  const qf2Winner = koWinner('qf2', qf.qf2);
  const qf3Winner = koWinner('qf3', qf.qf3);
  const qf4Winner = koWinner('qf4', qf.qf4);

  const sf1Teams = [qf1Winner, qf2Winner];
  const sf2Teams = [qf3Winner, qf4Winner];

  const sf1Winner = koWinner('sf1', sf1Teams);
  const sf2Winner = koWinner('sf2', sf2Teams);

  const finalTeams = [sf1Winner, sf2Winner];
  const champion = koWinner('final', finalTeams);

  function matchHtml(matchKey, teamPair, label) {
    const slotHtml = (idx) => {
      const teamId = teamPair[idx];
      if (!teamId) return `<div class="slot empty">TBD</div>`;
      const winner = koWinner(matchKey, teamPair);
      const isWinner = winner === teamId;
      return `<div class="slot filled" style="${isWinner ? 'color: var(--win)' : ''}">${teamName(teamId)}</div>`;
    };
    let selector = '';
    if (teamPair[0] && teamPair[1]) {
      const current = koWinner(matchKey, teamPair) || '';
      if (isAdmin) {
        selector = `
          <div class="divider"></div>
          <div class="slot">
            <span style="font-size:0.7rem; color:var(--ink-soft)">Winner</span>
            <select data-match="${matchKey}" data-a="${teamPair[0]}" data-b="${teamPair[1]}">
              <option value="">— select —</option>
              <option value="${teamPair[0]}" ${current == teamPair[0] ? 'selected' : ''}>${teamName(teamPair[0])}</option>
              <option value="${teamPair[1]}" ${current == teamPair[1] ? 'selected' : ''}>${teamName(teamPair[1])}</option>
            </select>
          </div>`;
      } else if (current) {
        selector = `
          <div class="divider"></div>
          <div class="slot"><span style="font-size:0.7rem; color:var(--ink-soft)">Winner</span><span style="font-weight:600; color:var(--win)">${teamName(current)}</span></div>`;
      }
    }
    return `
      <div class="ko-label">${label}</div>
      <div class="ko-match">
        ${slotHtml(0)}
        ${slotHtml(1)}
        ${selector}
      </div>`;
  }

  container.innerHTML = `
    <div class="bracket">
      <div class="bracket-col col-qf">
        ${matchHtml('qf1', qf.qf1, 'QF1 · A1 vs D2')}
        ${matchHtml('qf2', qf.qf2, 'QF2 · C1 vs B2')}
        ${matchHtml('qf3', qf.qf3, 'QF3 · B1 vs C2')}
        ${matchHtml('qf4', qf.qf4, 'QF4 · D1 vs A2')}
      </div>
      <div class="bracket-col col-sf">
        ${matchHtml('sf1', sf1Teams, 'Semifinal 1')}
        ${matchHtml('sf2', sf2Teams, 'Semifinal 2')}
      </div>
      <div class="bracket-col col-final">
        ${matchHtml('final', finalTeams, 'Final')}
        ${champion ? `<div class="champion-card"><div class="label">Champion</div><div class="name">${teamName(champion)}</div></div>` : ''}
      </div>
    </div>
  `;

  if (!isAdmin) return;
  container.querySelectorAll('select[data-match]').forEach(select => {
    select.addEventListener('change', (e) => {
      const matchKey = e.target.dataset.match;
      const a = Number(e.target.dataset.a);
      const b = Number(e.target.dataset.b);
      const key = `${matchKey}-${a}-${b}`;
      if (e.target.value === '') {
        delete koOverrides[key];
      } else {
        koOverrides[key] = Number(e.target.value);
      }
      saveState();
      renderKnockout();
    });
  });
}

function switchView(viewName) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + viewName).classList.add('active');
  document.querySelector(`nav.tabs button[data-view="${viewName}"]`).classList.add('active');
}

document.querySelectorAll('nav.tabs button').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});

function updateAdminUI() {
  const status = document.getElementById('admin-status');
  const loginBtn = document.getElementById('admin-login-btn');
  const logoutBtn = document.getElementById('admin-logout-btn');
  const resetToolbar = document.getElementById('reset-toolbar');
  const sub = document.getElementById('header-sub');
  if (isAdmin) {
    status.textContent = 'Editing as tournament organizer';
    status.style.color = 'var(--win)';
    loginBtn.style.display = 'none';
    logoutBtn.style.display = 'inline-block';
    resetToolbar.style.display = 'flex';
    sub.textContent = 'Enter set scores below — standings and the bracket update for everyone instantly.';
  } else {
    status.textContent = 'Viewing only';
    status.style.color = 'var(--ink-soft)';
    loginBtn.style.display = 'inline-block';
    logoutBtn.style.display = 'none';
    resetToolbar.style.display = 'none';
    sub.textContent = 'Live results — standings and the knockout bracket update automatically.';
  }
}

document.getElementById('admin-login-btn').addEventListener('click', () => {
  const pw = prompt('Enter editor password:');
  if (pw === null) return;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    sessionStorage.setItem('volleyball_is_admin', 'true');
    updateAdminUI();
    renderStandings(); renderFixtures(); renderKnockout();
  } else {
    alert('Incorrect password.');
  }
});

document.getElementById('admin-logout-btn').addEventListener('click', () => {
  isAdmin = false;
  sessionStorage.removeItem('volleyball_is_admin');
  updateAdminUI();
  renderStandings(); renderFixtures(); renderKnockout();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (!isAdmin) return;
  if (!confirm('Reset all match results and bracket selections for everyone? This cannot be undone.')) return;
  fixtures.forEach(f => { f.setsA = null; f.setsB = null; });
  koOverrides = {};
  saveState();
});

updateAdminUI();
renderStandings();
renderFixtures();
renderKnockout();

if (window.__fbDb) {
  setupFirebaseSync();
} else {
  window.addEventListener('firebase-ready', setupFirebaseSync);
}
</script>

</body>
</html>
